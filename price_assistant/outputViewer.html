<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="public/logo.png" />
  <title>Price List Viewer</title>
  <style>
    :root {
      --bg: #0b1120;
      --bg-soft: #121a2f;
      --card: #0f172a;
      --line: rgba(255,255,255,0.12);
      --text: #e5edff;
      --muted: #9aaed6;
      --ok: #1fc3a2;
      --warn: #f5b84f;
      --accent: #5a82ff;
      --sticky-topbar-offset: 0px;
      --sticky-head-offset: 44px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 300px at -10% -20%, rgba(90,130,255,.28), transparent),
        radial-gradient(1000px 260px at 120% -30%, rgba(31,195,162,.18), transparent),
        var(--bg);
    }

    .wrap {
      width: min(1500px, 96vw);
      margin: 18px auto;
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 14px;
      height: calc(100vh - 36px);
    }

    .panel, .main {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(10,16,32,.9);
      min-height: 0;
    }

    .panel {
      position: sticky;
      top: 0;
      height: fit-content;
      max-height: 100vh;
      overflow-y: auto;
      z-index: 15;
      align-self: start;
    }

    .section {
      padding: 12px;
      border-bottom: 1px solid var(--line);
    }

    .section:last-child { border-bottom: 0; }

    h1 {
      margin: 0;
      font-size: 18px;
    }

    .muted { color: var(--muted); font-size: 12px; }

    .mini-link {
      display: inline-block;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 1px 7px;
      font-size: 11px;
      margin-right: 6px;
      color: #d6e4ff;
      background: rgba(255,255,255,.04);
      text-decoration: none;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    input, select, textarea, button {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255,255,255,.03);
      color: var(--text);
      padding: 9px 10px;
      font-size: 13px;
    }

    /* Force readable native dropdown options on Windows/light popups. */
    select option {
      color: #111827;
      background: #f8fbff;
    }

    button {
      cursor: pointer;
      font-weight: 600;
      background: rgba(255,255,255,.05);
    }

    .btn-primary {
      border-color: transparent;
      background: linear-gradient(120deg, var(--accent), var(--ok));
      color: #f6fbff;
    }

    .btn-sync {
      border: 1px solid rgba(90,130,255,.3);
      color: #8db3ff;
      background: rgba(90,130,255,.08);
      transition: background .2s;
    }
    .btn-sync:hover {
      background: rgba(90,130,255,.18);
    }

    .row2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .link-saving {
      opacity: .55;
      pointer-events: none;
    }

    .link-status {
      font-size: 10px;
      margin-top: 2px;
      min-height: 14px;
      transition: opacity .3s;
    }

    .link-status.ok  { color: var(--ok); }
    .link-status.err { color: #f87171; }

    .main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .topbar {
      flex-shrink: 0;
      position: sticky;
      top: var(--sticky-topbar-offset);
      z-index: 12;
      border-bottom: 1px solid var(--line);
      padding: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      background: linear-gradient(180deg, rgba(10,16,32,.98) 0%, rgba(10,16,32,.95) 100%);
      backdrop-filter: blur(8px);
      border-radius: 14px 14px 0 0;
    }

    .chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      color: #d9e5ff;
      background: rgba(90,130,255,.2);
    }

    .table-wrap {
      flex: 1;
      min-height: 0;
      overflow: auto;
      position: relative;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 8px;
      vertical-align: top;
      text-align: left;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 11;
      text-transform: uppercase;
      font-size: 11px;
      color: #bfd0ff;
      background: rgba(9,14,29,.96);
    }

    a { color: #8db3ff; text-decoration: none; }

    .stock {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      color: #d8fff6;
      border: 1px solid rgba(31,195,162,.45);
      background: rgba(31,195,162,.2);
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 180px;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .link-item a {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 180px;
    }

    .link-remove {
      width: 22px;
      height: 22px;
      border-radius: 7px;
      padding: 0;
      font-size: 11px;
      line-height: 1;
    }

    .link-add {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }

    .link-add input {
      min-width: 160px;
      padding: 6px 8px;
      font-size: 12px;
    }

    .link-add button {
      width: auto;
      padding: 6px 10px;
      font-size: 12px;
    }

    .cat-path {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .cat-label {
      display: inline-block;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 2px 7px;
      font-size: 11px;
      color: #dfe8ff;
      background: rgba(90,130,255,.12);
      white-space: nowrap;
    }

    .search-select {
      position: relative;
    }

    .search-select-trigger {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255,255,255,.03);
      color: var(--text);
      padding: 9px 10px;
      font-size: 13px;
      text-align: left;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
    }

    .search-select-panel {
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% + 6px);
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #0f172a;
      box-shadow: 0 12px 28px rgba(0,0,0,.35);
      z-index: 50;
      display: none;
      overflow: hidden;
    }

    .search-select.open .search-select-panel {
      display: block;
    }

    .search-select-search {
      border: 0;
      border-bottom: 1px solid var(--line);
      border-radius: 0;
      background: rgba(255,255,255,.04);
      padding: 8px 10px;
    }

    .search-select-list {
      max-height: 220px;
      overflow: auto;
      display: flex;
      flex-direction: column;
    }

    .search-select-option {
      border: 0;
      border-bottom: 1px solid rgba(255,255,255,.06);
      border-radius: 0;
      background: transparent;
      color: var(--text);
      text-align: left;
      padding: 8px 10px;
      font-size: 13px;
      cursor: pointer;
    }

    .search-select-option:last-child {
      border-bottom: 0;
    }

    .search-select-option:hover,
    .search-select-option.active {
      background: rgba(90,130,255,.22);
    }

    /* Themed scrollbars for dark UI surfaces */
    .panel,
    .table-wrap {
      scrollbar-width: thin;
      scrollbar-color: rgba(90,130,255,.75) rgba(255,255,255,.06);
    }

    .panel::-webkit-scrollbar,
    .table-wrap::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    .panel::-webkit-scrollbar-track,
    .table-wrap::-webkit-scrollbar-track {
      background: rgba(255,255,255,.05);
      border-radius: 999px;
    }

    .panel::-webkit-scrollbar-thumb,
    .table-wrap::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, rgba(90,130,255,.85), rgba(31,195,162,.75));
      border-radius: 999px;
      border: 2px solid rgba(8, 14, 30, .65);
    }

    .panel::-webkit-scrollbar-thumb:hover,
    .table-wrap::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, rgba(122,156,255,.95), rgba(50,210,178,.9));
    }

    .panel::-webkit-scrollbar-corner,
    .table-wrap::-webkit-scrollbar-corner {
      background: transparent;
    }

    .empty {
      padding: 26px;
      text-align: center;
      color: var(--muted);
    }

    .loading-overlay {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
      background: rgba(7, 12, 24, 0.78);
      backdrop-filter: blur(2px);
    }

    .loading-spinner {
      width: 28px;
      height: 28px;
      border: 3px solid rgba(255,255,255,.18);
      border-top-color: var(--accent);
      border-radius: 999px;
      animation: spin .8s linear infinite;
    }

    .loading-text {
      font-size: 13px;
      color: #d9e6ff;
      font-weight: 600;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 1100px) {
      .wrap {
        grid-template-columns: 1fr;
        height: auto;
        min-height: calc(100vh - 36px);
      }

      .main {
        overflow: visible;
      }

      .table-wrap {
        overflow: visible;
      }

      th {
        top: var(--sticky-head-offset);
      }
    }
  </style>
</head>
<body>
  <div style="padding:8px 20px; border-bottom:1px solid rgba(255,255,255,.08); display:flex; gap:8px; background:rgba(0,0,0,.3);">
    <a href="/outputViewer.html" style="font-size:12px; font-weight:600; padding:5px 14px; border-radius:8px; border:1px solid #5a82ff; color:#5a82ff; background:rgba(90,130,255,.1); text-decoration:none;">📋 Product Viewer</a>
    <a href="/priceAnalyzer.html" style="font-size:12px; font-weight:600; padding:5px 14px; border-radius:8px; border:1px solid rgba(255,255,255,.15); color:#8a9dc4; text-decoration:none;">💰 Price Analyzer</a>
  </div>
  <div class="wrap">
    <aside class="panel">
      <div class="section">
        <h1>Price List Viewer</h1>
        <div class="muted">Local JSON viewer with filters and multi-link support.</div>
      </div>

      <div class="section">
        <label>Load JSON File</label>
        <input id="fileInput" type="file" accept="application/json,.json" />
        <div style="height:8px"></div>
        <button id="loadDefaultBtn">Load output.json (same folder)</button>
      </div>

      <div class="section">
        <label for="searchInput">Search</label>
        <input id="searchInput" type="text" placeholder="id, name, brand, slug" />

        <div style="height:8px"></div>
        <label for="brandFilter">Brand</label>
        <div id="brandFilter" class="search-select"></div>

        <div style="height:8px"></div>
        <label for="categoryFilter">Category</label>
        <div id="categoryFilter" class="search-select"></div>

        <div style="height:8px"></div>
        <label for="excludeBrands">Exclude Brands (comma/newline)</label>
        <textarea id="excludeBrands" rows="3" placeholder="ASUS, MSI"></textarea>
      </div>

      <div class="section">
        <div class="row2">
          <div>
            <label for="minPrice">Min Price</label>
            <input id="minPrice" type="number" step="0.01" />
          </div>
          <div>
            <label for="maxPrice">Max Price</label>
            <input id="maxPrice" type="number" step="0.01" />
          </div>
        </div>

        <div style="height:8px"></div>
        <div class="row2">
          <div>
            <label for="minDiscount">Min Discount Price</label>
            <input id="minDiscount" type="number" step="0.01" />
          </div>
          <div>
            <label for="maxDiscount">Max Discount Price</label>
            <input id="maxDiscount" type="number" step="0.01" />
          </div>
        </div>

        <div style="height:8px"></div>
        <div class="row2">
          <div>
            <label for="minQty">Min Qty</label>
            <input id="minQty" type="number" />
          </div>
          <div>
            <label for="maxQty">Max Qty</label>
            <input id="maxQty" type="number" />
          </div>
        </div>

        <div style="height:8px"></div>
        <div class="row2">
          <div>
            <label for="sortSelect">Sort</label>
            <select id="sortSelect">
              <option value="">Default</option>
              <option value="price_asc">Price Low to High</option>
              <option value="price_desc">Price High to Low</option>
              <option value="discount_asc">Discount Low to High</option>
              <option value="discount_desc">Discount High to Low</option>
              <option value="qty_desc">Qty High to Low</option>
              <option value="qty_asc">Qty Low to High</option>
              <option value="links_desc">Most Links First</option>
              <option value="links_asc">Fewest Links First</option>
            </select>
          </div>
          <div>
            <label for="hasLinks">Links Filter</label>
            <select id="hasLinks">
              <option value="">All</option>
              <option value="yes">Has competitor links</option>
              <option value="no">No competitor links</option>
            </select>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="actions">
          <button id="applyBtn" class="btn-primary">Apply Filters</button>
          <button id="resetBtn">Reset Filters</button>
          <button id="syncLinksBtn" class="btn-sync">🔄 Sync Links</button>
          <button id="exportBtn">Export JSON</button>
          <button id="csvBtn" style="grid-column: span 2;">Export CSV</button>
        </div>
      </div>
    </aside>

    <section class="main">
      <div class="topbar">
        <span id="statTotal" class="chip">Total: 0</span>
        <span id="statFiltered" class="chip">Filtered: 0</span>
        <span id="statLinked" class="chip">Linked: 0</span>
      </div>
      <div id="loadingOverlay" class="loading-overlay" aria-live="polite" aria-busy="true">
        <div class="loading-spinner"></div>
        <div id="loadingText" class="loading-text">Loading data...</div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>ID</th>
              <th>Name</th>
              <th>Brand</th>
              <th>Categories</th>
              <th>Price</th>
              <th>Discount</th>
              <th>Qty</th>
              <th>Status</th>
              <th>Slug</th>
              <th>Links (multiple)</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
        <div id="empty" class="empty">Load a JSON file to start.</div>
      </div>
    </section>
  </div>

  <script>
    const COMPETITOR_LINK_FILE_NAME = "competitorProductLink.json";
    // Relative URL — works from any port since page is served by the same server
    const LINKS_API_URL = "/api/links";

    const state = {
      raw: [],
      filtered: [],
      linksMap: {},
      linksAutoLoaded: false,
      lastLinksRawJSON: "",
      fsWriteWarned: false,
      brandOptionsAll: [],
      categoryOptionsAll: [],
      searchSelects: {},
      loading: false,
    };

    const el = {
      fileInput: document.getElementById("fileInput"),
      loadDefaultBtn: document.getElementById("loadDefaultBtn"),
      searchInput: document.getElementById("searchInput"),
      brandFilter: document.getElementById("brandFilter"),
      categoryFilter: document.getElementById("categoryFilter"),
      excludeBrands: document.getElementById("excludeBrands"),
      minPrice: document.getElementById("minPrice"),
      maxPrice: document.getElementById("maxPrice"),
      minDiscount: document.getElementById("minDiscount"),
      maxDiscount: document.getElementById("maxDiscount"),
      minQty: document.getElementById("minQty"),
      maxQty: document.getElementById("maxQty"),
      sortSelect: document.getElementById("sortSelect"),
      hasLinks: document.getElementById("hasLinks"),
      applyBtn: document.getElementById("applyBtn"),
      resetBtn: document.getElementById("resetBtn"),
      syncLinksBtn: document.getElementById("syncLinksBtn"),
      exportBtn: document.getElementById("exportBtn"),
      csvBtn: document.getElementById("csvBtn"),
      tbody: document.getElementById("tbody"),
      empty: document.getElementById("empty"),
      topbar: document.querySelector(".topbar"),
      statTotal: document.getElementById("statTotal"),
      statFiltered: document.getElementById("statFiltered"),
      statLinked: document.getElementById("statLinked"),
      loadingOverlay: document.getElementById("loadingOverlay"),
      loadingText: document.getElementById("loadingText"),
    };

    bindEvents();
    initSearchableSelects();
    updateStickyOffsets();

    function bindEvents() {
      el.fileInput.addEventListener("change", onFilePicked);
      el.loadDefaultBtn.addEventListener("click", loadDefaultJson);
      el.applyBtn.addEventListener("click", applyFilters);
      el.resetBtn.addEventListener("click", resetFilters);
      if (el.syncLinksBtn) el.syncLinksBtn.addEventListener("click", () => syncCompetitorLinks(true));
      el.exportBtn.addEventListener("click", exportMergedJson);
      el.csvBtn.addEventListener("click", exportCsv);
      window.addEventListener("resize", updateStickyOffsets);

      el.tbody.addEventListener("click", onTableClick);
      el.tbody.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && event.target.matches(".new-link-input")) {
          event.preventDefault();
          const btn = event.target.parentElement.querySelector(".add-link-btn");
          if (btn) btn.click();
        }
      });
    }

    function updateStickyOffsets() {
      const topbarHeight = el.topbar ? Math.ceil(el.topbar.getBoundingClientRect().height) : 44;
      document.documentElement.style.setProperty("--sticky-head-offset", `${topbarHeight}px`);
    }

    function initSearchableSelects() {
      state.searchSelects.brand = createSearchSelect(el.brandFilter, {
        allLabel: "All Brands",
        searchPlaceholder: "Search brands...",
        onChange: applyFilters,
      });

      state.searchSelects.category = createSearchSelect(el.categoryFilter, {
        allLabel: "All Categories",
        searchPlaceholder: "Search categories...",
        onChange: applyFilters,
      });

      document.addEventListener("click", (event) => {
        if (!event.target.closest(".search-select")) {
          closeAllSearchSelects();
        }
      });
    }

    function createSearchSelect(root, config) {
      root.innerHTML = `
        <button type="button" class="search-select-trigger">
          <span>${escapeHtml(config.allLabel)}</span>
          <span>▾</span>
        </button>
        <div class="search-select-panel">
          <input class="search-select-search" type="text" placeholder="${escapeHtml(config.searchPlaceholder)}" />
          <div class="search-select-list"></div>
        </div>
      `;

      const control = {
        root,
        trigger: root.querySelector(".search-select-trigger"),
        triggerText: root.querySelector(".search-select-trigger span"),
        panel: root.querySelector(".search-select-panel"),
        search: root.querySelector(".search-select-search"),
        list: root.querySelector(".search-select-list"),
        allLabel: config.allLabel,
        options: [],
        selected: "",
        onChange: config.onChange,
      };

      control.trigger.addEventListener("click", () => {
        const isOpen = control.root.classList.contains("open");
        closeAllSearchSelects();
        if (!isOpen) {
          control.root.classList.add("open");
          control.search.focus();
          renderSearchSelectOptions(control, control.search.value);
        }
      });

      control.search.addEventListener("input", () => {
        renderSearchSelectOptions(control, control.search.value);
      });

      control.list.addEventListener("click", (event) => {
        const optionBtn = event.target.closest("button[data-value]");
        if (!optionBtn) return;

        control.selected = optionBtn.dataset.value || "";
        control.triggerText.textContent = control.selected || control.allLabel;
        control.root.classList.remove("open");
        if (control.onChange) control.onChange();
      });

      renderSearchSelectOptions(control, "");
      return control;
    }

    function closeAllSearchSelects() {
      Object.values(state.searchSelects).forEach((ctrl) => {
        if (!ctrl) return;
        ctrl.root.classList.remove("open");
      });
    }

    function renderSearchSelectOptions(control, query) {
      const q = String(query || "").trim().toLowerCase();
      const filtered = q
        ? control.options.filter((opt) => opt.toLowerCase().includes(q))
        : control.options;

      const rows = [{ value: "", label: control.allLabel }, ...filtered.map((opt) => ({ value: opt, label: opt }))];
      control.list.innerHTML = rows.map((row) => {
        const active = control.selected === row.value ? "active" : "";
        return `<button type="button" class="search-select-option ${active}" data-value="${escapeHtml(row.value)}">${escapeHtml(row.label)}</button>`;
      }).join("");
    }

    function setSearchSelectOptions(key, options) {
      const control = state.searchSelects[key];
      if (!control) return;

      const next = Array.from(new Set((options || []).filter(Boolean)));
      control.options = next;
      if (control.selected && !next.includes(control.selected)) {
        control.selected = "";
      }
      control.triggerText.textContent = control.selected || control.allLabel;
      renderSearchSelectOptions(control, control.search.value);
    }

    function getSearchSelectValue(key) {
      return state.searchSelects[key]?.selected || "";
    }

    function resetSearchSelectValue(key) {
      const control = state.searchSelects[key];
      if (!control) return;
      control.selected = "";
      control.search.value = "";
      control.triggerText.textContent = control.allLabel;
      renderSearchSelectOptions(control, "");
    }

    async function loadDefaultJson() {
      setLoading(true, "Loading output.json...");
      try {
        await nextPaint();
        const res = await fetch("./output.json");
        if (!res.ok) throw new Error("output.json not found");
        const data = await res.json();
        setLoading(true, "Loading competitor links...");
        await autoLoadCompetitorLinks();
        setLoading(true, "Preparing rows...");
        setData(data);
      } catch (err) {
        alert("Could not load ./output.json directly. If you opened HTML using file://, browser may block fetch. Use the file picker instead.");
      } finally {
        setLoading(false);
      }
    }

    async function autoLoadCompetitorLinks() {
      if (state.linksAutoLoaded) return;
      state.linksAutoLoaded = true;

      try {
        const res = await fetch(LINKS_API_URL);
        if (!res.ok) return;
        const text = await res.text();
        state.lastLinksRawJSON = text;
        const data = JSON.parse(text);
        state.linksMap = mergeLinksMaps(state.linksMap, normalizeLinksPayload(data));
        
        // Start multi-user auto-polling (every 8 sec)
        setInterval(() => syncCompetitorLinks(false), 8000);
        return;
      } catch {
        // Fallback for static mode without Node API.
      }

      try {
        const res = await fetch(`./${COMPETITOR_LINK_FILE_NAME}`);
        if (!res.ok) return;
        const data = await res.json();
        state.linksMap = mergeLinksMaps(state.linksMap, normalizeLinksPayload(data));
      } catch {
        // Optional file; ignore silently.
      }
    }

    async function onFilePicked(event) {
      const file = event.target.files?.[0];
      if (!file) return;
      setLoading(true, "Reading selected JSON file...");
      try {
        await nextPaint();
        const text = await file.text();
        let data = [];
        data = JSON.parse(text);
        setLoading(true, "Loading competitor links...");
        await autoLoadCompetitorLinks();
        setLoading(true, "Preparing rows...");
        setData(data);
      } catch {
        alert("Invalid JSON file.");
      } finally {
        setLoading(false);
      }
    }

    function setLoading(isLoading, text = "Loading data...") {
      state.loading = isLoading;
      if (el.loadingText) el.loadingText.textContent = text;
      if (el.loadingOverlay) el.loadingOverlay.style.display = isLoading ? "flex" : "none";
      if (el.applyBtn) el.applyBtn.disabled = isLoading;
      if (el.resetBtn) el.resetBtn.disabled = isLoading;
      if (el.syncLinksBtn) el.syncLinksBtn.disabled = isLoading;
      if (el.exportBtn) el.exportBtn.disabled = isLoading;
      if (el.csvBtn) el.csvBtn.disabled = isLoading;
      if (el.loadDefaultBtn) el.loadDefaultBtn.disabled = isLoading;
      if (el.fileInput) el.fileInput.disabled = isLoading;
    }

    async function syncCompetitorLinks(manual = false) {
      if (manual) setLoading(true, "Syncing latest links from server...");
      try {
        const res = await fetch(LINKS_API_URL);
        if (!res.ok) throw new Error("Sync failed");
        
        const text = await res.text();
        if (text !== state.lastLinksRawJSON) {
          state.lastLinksRawJSON = text;
          state.linksMap = normalizeLinksPayload(JSON.parse(text));
          
          if (!manual) {
            safeAutoRender();
          } else {
            render();
          }
        }
      } catch (err) {
        if (manual) alert("Could not reach API server.");
      } finally {
        if (manual) setLoading(false);
      }
    }

    function safeAutoRender() {
      const active = document.activeElement;
      // If user is currently typing in an input within the table body, don't steal focus
      const isTyping = active && active.tagName === "INPUT" && el.tbody.contains(active);
      if (isTyping) {
        // Delay application so we don't clear their text mid-typing
        later(safeAutoRender, 2000);
        return;
      }
      render();
    }

    function nextPaint() {
      return new Promise((resolve) => requestAnimationFrame(() => resolve()));
    }

    function setData(data) {
      if (!Array.isArray(data)) {
        alert("JSON root must be an array.");
        return;
      }

      state.raw = data.map((item, idx) => normalizeItem(item, idx));
      rebuildBrandOptions();
      applyFilters();
    }

    function normalizeItem(item, idx) {
      const p = normalizeMoney(item.price);
      const d = normalizeMoney(item.discountPrice);
      const qtyNum = normalizeQty(item.quantity);

      const normalized = {
        productId: String(item.productId || extractProductIdFromUrl(item.viewUrl || item.editUrl || "") || ""),
        name: String(item.name || ""),
        viewUrl: String(item.viewUrl || ""),
        editUrl: String(item.editUrl || ""),
        price: p.num.toFixed(2),
        discountPrice: d.num.toFixed(2),
        quantity: String(qtyNum),
        priceNum: p.num,
        discountNum: d.num,
        qtyNum,
        stockStatus: String(item.stockStatus || ""),
        brand: String(item.brand || ""),
        categories: normalizeCategories(item.categories),
        slug: String(item.slug || ""),
        frontendUrl: String(item.frontendUrl || ""),
        _rowKey: "",
      };

      normalized.categoryPath = buildCategoryPath(normalized.categories);
      normalized.categoryText = normalized.categoryPath;
      normalized._rowKey = buildRowKey(normalized, idx);

      const key = productKey(normalized, idx);
      const fromJsonLinks = pickLinks(item);
      const persistedLinks = state.linksMap[key] || [];
      state.linksMap[key] = uniqueLinks([...fromJsonLinks, ...persistedLinks]);

      return normalized;
    }

    function pickLinks(item) {
      const candidates = [];
      const fields = ["competitorLinks", "externalLinks", "links"];
      for (const f of fields) {
        const value = item?.[f];
        if (!value) continue;
        if (Array.isArray(value)) {
          value.forEach((v) => {
            if (typeof v === "string") candidates.push(v);
            else if (v && typeof v.url === "string") candidates.push(v.url);
          });
        }
      }
      return uniqueLinks(candidates);
    }

    function applyFilters() {
      const q = el.searchInput.value.trim().toLowerCase();
      const brand = getSearchSelectValue("brand").trim().toLowerCase();
      const category = getSearchSelectValue("category").trim().toLowerCase();
      const excludes = parseExclude(el.excludeBrands.value);

      const minPrice = numOrNull(el.minPrice.value);
      const maxPrice = numOrNull(el.maxPrice.value);
      const minDiscount = numOrNull(el.minDiscount.value);
      const maxDiscount = numOrNull(el.maxDiscount.value);
      const minQty = intOrNull(el.minQty.value);
      const maxQty = intOrNull(el.maxQty.value);
      const hasLinks = el.hasLinks.value;

      state.filtered = state.raw.filter((item, idx) => {
        const key = productKey(item, idx);
        const links = state.linksMap[key] || [];

        const hay = `${item.productId || ""} ${item.name} ${item.brand} ${item.slug} ${item.categoryText || ""}`.toLowerCase();
        if (q && !hay.includes(q)) return false;

        if (brand && item.brand.toLowerCase() !== brand) return false;

        if (category) {
          const foundCategory = (item.categories || []).some((c) => c.toLowerCase() === category);
          if (!foundCategory) return false;
        }

        if (excludes.length && excludes.includes(item.brand.toLowerCase())) return false;

        if (minPrice !== null && item.priceNum < minPrice) return false;
        if (maxPrice !== null && item.priceNum > maxPrice) return false;

        if (minDiscount !== null && item.discountNum < minDiscount) return false;
        if (maxDiscount !== null && item.discountNum > maxDiscount) return false;

        if (minQty !== null && item.qtyNum < minQty) return false;
        if (maxQty !== null && item.qtyNum > maxQty) return false;

        if (hasLinks === "yes" && !links.length) return false;
        if (hasLinks === "no" && links.length) return false;

        return true;
      });

      sortRows();
      render();
    }

    function sortRows() {
      const mode = el.sortSelect.value;
      if (!mode) return;

      const get = {
        price_asc: (x) => x.priceNum,
        price_desc: (x) => -x.priceNum,
        discount_asc: (x) => x.discountNum,
        discount_desc: (x) => -x.discountNum,
        qty_asc: (x) => x.qtyNum,
        qty_desc: (x) => -x.qtyNum,
        links_asc: (x) => linkCountForItem(x),
        links_desc: (x) => -linkCountForItem(x),
      }[mode];

      if (!get) return;
      state.filtered.sort((a, b) => get(a) - get(b));
    }

    function render() {
      el.tbody.innerHTML = "";
      el.statTotal.textContent = `Total: ${state.raw.length}`;
      el.statFiltered.textContent = `Filtered: ${state.filtered.length}`;
      const linkedCount = state.filtered.reduce((acc, item, idx) => {
        const key = productKey(item, idx);
        return acc + ((state.linksMap[key] || []).length ? 1 : 0);
      }, 0);
      el.statLinked.textContent = `Linked: ${linkedCount}`;
      el.empty.style.display = state.filtered.length ? "none" : "block";

      const frag = document.createDocumentFragment();
      state.filtered.forEach((item, i) => {
        const key = productKey(item, i);
        const links = state.linksMap[key] || [];

        const tr = document.createElement("tr");
        tr.dataset.key = key;
        tr.dataset.productid = item.productId || "";
        tr.innerHTML = `
          <td>${i + 1}</td>
          <td>${escapeHtml(item.productId || "")}</td>
          <td>
            <div>${escapeHtml(item.name)}</div>
            <div class="muted">
              ${item.viewUrl ? `<a class="mini-link" href="${escapeHtml(item.viewUrl)}" target="_blank">show</a>` : ""}
              ${item.editUrl ? `<a class="mini-link" href="${escapeHtml(item.editUrl)}" target="_blank">edit</a>` : ""}
              ${item.frontendUrl ? `<a class="mini-link" href="${escapeHtml(item.frontendUrl)}" target="_blank">frontend</a>` : ""}
            </div>
          </td>
          <td>${escapeHtml(item.brand)}</td>
          <td>${renderCategoryPath(item.categoryPath || item.categoryText || item.categories || [])}</td>
          <td>${item.priceNum.toFixed(2)}</td>
          <td>${item.discountNum.toFixed(2)}</td>
          <td>${item.qtyNum}</td>
          <td><span class="stock">${escapeHtml(item.stockStatus || "InStock")}</span></td>
          <td>${escapeHtml(item.slug)}</td>
          <td>
            <div class="links">
              ${links.map((link, idx) => `
                <div class="link-item">
                  <a href="${escapeHtml(link)}" target="_blank" title="${escapeHtml(link)}">${escapeHtml(link)}</a>
                  <button class="link-remove" data-index="${idx}">x</button>
                </div>
              `).join("")}
            </div>
            <div class="link-add">
              <input class="new-link-input" type="url" placeholder="https://competitor-site/product..." />
              <button class="add-link-btn">Add</button>
            </div>
            <div class="link-status"></div>
          </td>
        `;
        frag.appendChild(tr);
      });

      el.tbody.appendChild(frag);
      updateStickyOffsets();
    }

    async function onTableClick(event) {
      const tr = event.target.closest("tr[data-key]");
      if (!tr) return;
      const key = tr.dataset.key;
      const productIdToSave = tr.dataset.productid || key;

      if (event.target.classList.contains("add-link-btn")) {
        const btn   = event.target;
        const input = tr.querySelector(".new-link-input");
        const statusEl = tr.querySelector(".link-status");
        const value = (input?.value || "").trim();
        if (!value) return;
        if (!/^https?:\/\//i.test(value)) {
          alert("Please provide a valid http/https URL (must start with http:// or https://).");
          return;
        }

        // Snapshot before change
        const previous = state.linksMap[key] || [];
        const candidate = uniqueLinks([...previous, value]);

        // Temporarily disable while saving
        btn.textContent = "...";
        btn.disabled = true;
        input.disabled = true;
        if (statusEl) { statusEl.textContent = "Saving…"; statusEl.className = "link-status"; }

        // Optimistically update state only (not the DOM yet)
        state.linksMap[key] = candidate;
        const saved = await saveProductLinks(productIdToSave, candidate);

        btn.textContent = "Add";
        btn.disabled = false;
        input.disabled = false;

        if (saved) {
          // Confirmed — clear the input and re-render
          if (input) input.value = "";
          if (statusEl) { statusEl.textContent = "✓ Saved"; statusEl.className = "link-status ok"; later(() => { statusEl.textContent = ""; }, 2500); }
          render();
        } else {
          // Roll back — server didn't accept, do NOT update the DOM
          state.linksMap[key] = previous;
          if (statusEl) { statusEl.textContent = "✗ Save failed – server unreachable"; statusEl.className = "link-status err"; later(() => { statusEl.textContent = ""; }, 4000); }
          if (!state.fsWriteWarned) {
            state.fsWriteWarned = true;
            alert("Could not save to server.\nMake sure the Node server is running.\nThe link was NOT added.");
          }
        }
        return;
      }

      if (event.target.classList.contains("link-remove")) {
        const btn   = event.target;
        const index = Number(btn.dataset.index || "-1");
        if (index < 0) return;

        const previous = [...(state.linksMap[key] || [])];
        const candidate = [...previous];
        candidate.splice(index, 1);

        // Indicate work-in-progress
        btn.textContent = "…";
        btn.disabled = true;

        state.linksMap[key] = candidate;
        const saved = await saveProductLinks(productIdToSave, candidate);

        if (saved) {
          render();
        } else {
          // Roll back
          state.linksMap[key] = previous;
          btn.textContent = "x";
          btn.disabled = false;
          if (!state.fsWriteWarned) {
            state.fsWriteWarned = true;
            alert("Could not save to server.\nMake sure the Node server is running.\nThe link was NOT removed.");
          }
        }
      }
    }

    function rebuildBrandOptions() {
      state.brandOptionsAll = Array.from(new Set(state.raw.map((x) => x.brand).filter(Boolean))).sort((a, b) => a.localeCompare(b));
      setSearchSelectOptions("brand", state.brandOptionsAll);

      rebuildCategoryOptions();
    }

    function rebuildCategoryOptions() {
      state.categoryOptionsAll = Array.from(new Set(
        state.raw.flatMap((x) => x.categories || []).filter(Boolean)
      )).sort((a, b) => a.localeCompare(b));
      setSearchSelectOptions("category", state.categoryOptionsAll);
    }

    function resetFilters() {
      el.searchInput.value = "";
      resetSearchSelectValue("brand");
      resetSearchSelectValue("category");
      el.excludeBrands.value = "";
      el.minPrice.value = "";
      el.maxPrice.value = "";
      el.minDiscount.value = "";
      el.maxDiscount.value = "";
      el.minQty.value = "";
      el.maxQty.value = "";
      el.sortSelect.value = "";
      el.hasLinks.value = "";
      applyFilters();
    }

    function exportMergedJson() {
      if (!state.raw.length) return;
      const merged = state.raw.map((item, idx) => {
        const key = productKey(item, idx);
        return {
          ...item,
          productId: item.productId || extractProductIdFromUrl(item.viewUrl || item.editUrl || "") || "",
          price: item.priceNum.toFixed(2),
          discountPrice: item.discountNum.toFixed(2),
          quantity: String(item.qtyNum),
          categories: item.categories || [],
          competitorLinks: state.linksMap[key] || [],
        };
      });
      downloadText(JSON.stringify(merged, null, 2), `merged-products-${Date.now()}.json`, "application/json;charset=utf-8");
    }

    async function exportLinksJson() {
      const payload = buildCompetitorLinksPayload();
      const wrote = await saveLinksViaApi(payload);
      if (!wrote) {
        downloadText(JSON.stringify(payload, null, 2), COMPETITOR_LINK_FILE_NAME, "application/json;charset=utf-8");
      }
    }

    // autoSyncCompetitorLinkFile is no longer used for add/remove —
    // those paths now await saveLinksViaApi directly before updating the DOM.
    async function autoSyncCompetitorLinkFile() {
      const payload = buildCompetitorLinksPayload();
      const wrote = await saveLinksViaApi(payload);
      if (!wrote && !state.fsWriteWarned) {
        state.fsWriteWarned = true;
        alert("Node links API is unavailable. Start start-price-analyzer.bat and open http://localhost/outputViewer.html.");
      }
      return wrote;
    }

    function buildCompetitorLinksPayload() {
      const payload = {};

      // 1. Preserve all existing state.linksMap (don't lose products missing from output.json)
      for (const [key, links] of Object.entries(state.linksMap)) {
        if (links && links.length > 0) {
          payload[key] = [...links];
        }
      }

      // 2. Map loaded raw items back to explicit productId if available
      const sourceItems = state.raw.length ? state.raw : [];
      sourceItems.forEach((item, idx) => {
        const key = productKey(item, idx);
        const links = payload[key] || [];
        const productId = String(item.productId || "").trim();

        if (productId) {
          // Remap local fallback key to permanent productId if they differ
          if (key !== productId && links.length > 0) {
            payload[productId] = uniqueLinks([...(payload[productId] || []), ...links]);
            delete payload[key];
          }
        } else {
          // Un-syncable product (no ID)
          delete payload[key];
        }
      });

      // 3. Clean out empty arrays
      const cleanPayload = {};
      for (const [id, links] of Object.entries(payload)) {
        if (links && links.length > 0) {
          cleanPayload[id] = uniqueLinks(links);
        }
      }

      return cleanPayload;
    }

    function exportCsv() {
      if (!state.filtered.length) return;
      const headers = ["productId", "name", "brand", "categories", "price", "discountPrice", "quantity", "stockStatus", "slug", "viewUrl", "editUrl", "frontendUrl", "competitorLinks"];
      const lines = [headers.join(",")];
      state.filtered.forEach((item, idx) => {
        const key = productKey(item, idx);
        const links = (state.linksMap[key] || []).join(" | ");
        lines.push([
          csvCell(item.productId || ""),
          csvCell(item.name),
          csvCell(item.brand),
          csvCell((item.categories || []).join(" | ")),
          csvCell(item.priceNum.toFixed(2)),
          csvCell(item.discountNum.toFixed(2)),
          csvCell(item.qtyNum),
          csvCell(item.stockStatus),
          csvCell(item.slug),
          csvCell(item.viewUrl),
          csvCell(item.editUrl),
          csvCell(item.frontendUrl),
          csvCell(links),
        ].join(","));
      });
      downloadText(lines.join("\n"), `filtered-products-${Date.now()}.csv`, "text/csv;charset=utf-8");
    }

    function downloadText(text, fileName, mime) {
      const blob = new Blob([text], { type: mime });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = fileName;
      a.click();
      URL.revokeObjectURL(url);
    }

    function productKey(item, idx) {
      return item._rowKey || buildRowKey(item, idx);
    }

    function buildRowKey(item, idx) {
      return String(item.productId || "").trim() || item.slug || item.editUrl || `${item.name}__${idx}`;
    }

    function extractProductIdFromUrl(url) {
      const m = String(url || "").match(/\/admin\/product\/(\d+)\/(?:show|edit)(?:[/?#]|$)/i);
      return m ? m[1] : "";
    }

    function parseExclude(text) {
      return (text || "")
        .split(/[\n,]+/)
        .map((x) => x.trim().toLowerCase())
        .filter(Boolean);
    }

    function normalizeMoney(value) {
      const cleaned = String(value || "").replace(/[^\d.-]/g, "");
      const n = Number(cleaned);
      return {
        raw: value,
        num: Number.isFinite(n) ? n : 0,
      };
    }

    function normalizeQty(value) {
      const cleaned = String(value || "").replace(/[^\d-]/g, "");
      const n = Number(cleaned);
      return Number.isFinite(n) ? n : 0;
    }

    function normalizeCategories(value) {
      if (Array.isArray(value)) {
        return Array.from(new Set(value
          .map((x) => String(x || "").trim())
          .filter(Boolean)));
      }
      if (typeof value === "string" && value.trim()) {
        return Array.from(new Set(value
          .split(/[|,]+/)
          .map((x) => x.trim())
          .filter(Boolean)));
      }
      return [];
    }

    function buildCategoryPath(categories) {
      const parts = normalizeCategories(categories);
      if (!parts.length) return "";
      return parts.join(", ");
    }

    function renderCategoryPath(categories) {
      const parts = normalizeCategories(categories);
      if (!parts.length) return '<span class="muted">—</span>';

      return `<span class="cat-path">${parts.map((part) => `<span class="cat-label">${escapeHtml(part)}</span>`).join("")}</span>`;
    }

    function numOrNull(value) {
      if (value === "") return null;
      const n = Number(value);
      return Number.isFinite(n) ? n : null;
    }

    function intOrNull(value) {
      if (value === "") return null;
      const n = parseInt(value, 10);
      return Number.isFinite(n) ? n : null;
    }

    function uniqueLinks(arr) {
      return Array.from(new Set((arr || [])
        .map((x) => String(x || "").trim())
        .filter((x) => /^https?:\/\//i.test(x))));
    }

    function normalizeLinksPayload(data) {
      const out = {};

      if (Array.isArray(data)) {
        data.forEach((row) => {
          const id = String(row?.productId || "").trim();
          if (!id) return;
          const links = uniqueLinks(row?.links || row?.competitorLinks || []);
          if (!links.length) return;
          out[id] = links;
        });
        return out;
      }

      if (data && typeof data === "object") {
        Object.entries(data).forEach(([key, value]) => {
          const id = String(key || "").trim();
          if (!id) return;

          let links = [];
          if (Array.isArray(value)) links = uniqueLinks(value);
          else if (value && typeof value === "object") links = uniqueLinks(value.links || value.competitorLinks || []);

          if (!links.length) return;
          out[id] = links;
        });
      }

      return out;
    }

    function mergeLinksMaps(base, incoming) {
      const merged = { ...(base || {}) };
      Object.entries(incoming || {}).forEach(([key, value]) => {
        merged[key] = uniqueLinks([...(merged[key] || []), ...(value || [])]);
      });
      return merged;
    }

    function linkCountForItem(item) {
      const key = productKey(item, -1);
      return (state.linksMap[key] || []).length;
    }

    async function saveProductLinks(productId, links) {
      if (!productId) return false;
      try {
        const res = await fetch("/api/links/product", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ productId, links }),
        });
        if (res.ok) return true;

        // Fallback for older server versions that don't have /api/links/product
        if (res.status === 404) {
           const payload = buildCompetitorLinksPayload();
           return await saveLinksViaApi(payload);
        }
        return false;
      } catch {
        return false;
      }
    }

    async function saveLinksViaApi(payload) {
      try {
        const res = await fetch(LINKS_API_URL, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        return res.ok;
      } catch {
        return false;
      }
    }

    function csvCell(v) {
      return `"${String(v ?? "").replace(/"/g, '""')}"`;
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    /** setTimeout helper returning a Promise for use with later(fn, ms) await syntax */
    function later(fn, ms) {
      return new Promise((resolve) => setTimeout(() => { fn(); resolve(); }, ms));
    }

  </script>
</body>
</html>
